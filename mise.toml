[tools]
rust = "stable"
"cargo:cargo-audit" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-llvm-cov" = "latest"

[tasks.build]
description = "Build taskspace"
run = "cargo build --workspace"

[tasks.test]
description = "Run test suite"
run = "cargo test --workspace"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.audit]
description = "Run cargo-audit"
run = "cargo audit"

[tasks.deny]
description = "Run cargo-deny checks"
run = "cargo deny check"

[tasks.check]
description = "Run all quality checks"
depends = ["fmt", "lint", "test", "audit", "deny"]

[tasks.coverage]
description = "Run line coverage gate"
run = "cargo llvm-cov --workspace --all-features --fail-under-lines 70 -- --test-threads=1"
