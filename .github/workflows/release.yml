name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: taskspace
  PACKAGE_NAME: taskspace-cli

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

      - name: Line coverage (>=70%)
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 70 -- --test-threads=1

  build:
    name: Build (${{ matrix.target }})
    needs: quality
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --package ${{ env.PACKAGE_NAME }} --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="${BINARY_NAME}-v${VERSION}-${TARGET}.tar.gz"

          rm -rf dist
          mkdir -p dist/package

          cp "target/${TARGET}/release/${BINARY_NAME}" "dist/package/${BINARY_NAME}"
          chmod +x "dist/package/${BINARY_NAME}"

          tar -czf "dist/${ARCHIVE}" -C dist/package "${BINARY_NAME}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"
          else
            shasum -a 256 "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        run: find dist -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
